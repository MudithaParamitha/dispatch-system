<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login | Dispatch Letter Validation System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/app.css">
  
  <style>
    body {
      min-height: 100vh;
      background: 
        linear-gradient(rgba(11,47,163,0.55), rgba(11,47,163,0.55)),
        url("../assets/images/login-bg.jpg") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Public Sans", Arial, sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }
    .login-card img {
      height: 48px;
    }
    .login-title {
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
    }
    .form-control {
      height: 44px;
    }
    .btn-login {
      height: 44px;
      font-weight: 500;
    }

  @media (max-width: 576px) {
    .login-card {
      max-width: 320px;      
      padding: 20px;         
      border-radius: 10px;
    }
    .login-card img {
      height: 40px;          
    }
    .login-title {
      font-size: 16px;     
    }
    .login-subtitle {
      font-size: 13px;
      margin-bottom: 16px;
    }
    .form-control {
      height: 40px;         
      font-size: 14px;
    }
    .btn-login {
      height: 40px;
      font-size: 14px;
    }
  }
  </style>
  </head>
<body>
  <div class="login-card">
    <div class="text-center mb-3">
      <img src="../assets/images/logopertamina.png" alt="Pertamina Patra Niaga">
    </div>
    <div class="text-center">
      <div class="login-title">Dispatch Letter Validation System</div>
      <div class="login-subtitle">Silakan login untuk melanjutkan</div>
    </div>
    <div id="loginError" class="alert alert-danger d-none">
      Username atau password salah
    </div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="rememberMe">
        <label class="form-check-label" for="rememberMe">
          Remember me
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-login">
        Login
      </button>
    </form>
    </div>
    <script>
      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("loginError");
      const VALID_USERNAME = "admin";
      const VALID_PASSWORD = "admin123";
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        if (username === VALID_USERNAME && password === VALID_PASSWORD) {
          localStorage.setItem("isLoggedIn", "true");
          window.location.href = "../index.html";
        } else {
          errorBox.classList.remove("d-none");
        }
      });
    </script>
</body>
</html>
